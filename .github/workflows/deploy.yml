name: Frontend — Build & Deploy

on:
  pull_request:
    branches:
      - main
    types:
      - closed   # срабатывает только после merge

# Разрешения для записи в GitHub Container Registry
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/skaldengine-frontend

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build React + Push Docker image to GHCR
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    # Запускаем только если PR был смёрджен (не просто закрыт)
    if: github.event.pull_request.merged == true

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Включаем Docker BuildKit для кеширования слоёв
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Логин в GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Генерируем теги: latest + sha коммита
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Собираем React-билд внутри Docker (multi-stage: node → nginx)
      # и пушим образ в GHCR
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Кешируем layer-ы в GitHub Actions Cache для ускорения сборки
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy на сервер через SSH
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # опционально: защита через GitHub Environments

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_KEY_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            # Логин в GHCR на сервере
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Переходим в папку с docker-compose бэкенда
            cd ${{ secrets.DEPLOY_PATH }}

            # Тянем свежий образ фронтенда
            docker compose pull frontend

            # Перезапускаем только контейнер фронта (без даунтайма остальных)
            docker compose up -d --no-deps frontend

            # Убираем старые образы
            docker image prune -f

            echo "✅ Frontend deployed successfully"
