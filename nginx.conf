server {
    listen 80;
    server_name _;

    include /etc/nginx/mime.types;

    # 1. Отдаем статику фронтенда
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # ВАЖНО ДЛЯ REACT/VITE: Если файл не найден, отдаем index.html (для роутинга)
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксируем API-запросы в твой Python Gateway
    # В docker-compose твой шлюз называется "gateway" и работает на порту 8080
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Hide duplicate headers from upstream
        proxy_hide_header 'date';
        proxy_hide_header 'server';

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}